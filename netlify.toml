[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# HTTPS + canonical host FIRST (before SPA /* catch-all, which would otherwise serve over HTTP)
[[redirects]]
  from = "http://cover-iq.com/*"
  to = "https://cover-iq.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.cover-iq.com/*"
  to = "https://cover-iq.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.cover-iq.com/*"
  to = "https://cover-iq.com/:splat"
  status = 301
  force = true

# MIRA API proxy (same-origin — avoids CORS)
[[redirects]]
  from = "/api/mira/*"
  to = "https://api.syntrix.solutions/api/mira/:splat"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

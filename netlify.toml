[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[edge_functions]]
  path = "/api/mira/*"
  function = "mira-rate-limit"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "upgrade-insecure-requests"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# HTTPS + canonical host FIRST (before SPA /* catch-all)
[[redirects]]
  from = "http://cover-iq.com/*"
  to = "https://cover-iq.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.cover-iq.com/*"
  to = "https://cover-iq.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.cover-iq.com/*"
  to = "https://cover-iq.com/:splat"
  status = 301
  force = true

# Block MCP-style probe paths (SPA was returning 200 + HTML — false positive for scanners)
[[redirects]]
  from = "/tools"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tools/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/messages"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/messages/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/mcp"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/mcp/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/sse"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/sse/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.well-known/mcp*"
  to = "/404.html"
  status = 404
  force = true

# MIRA API proxy (same-origin — avoids CORS)
[[redirects]]
  from = "/api/mira/*"
  to = "https://api.syntrix.solutions/api/mira/:splat"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

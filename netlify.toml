[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Force HTTPS and canonical host (www → apex)
[[redirects]]
  from = "http://cover-iq.com/*"
  to = "https://cover-iq.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.cover-iq.com/*"
  to = "https://cover-iq.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.cover-iq.com/*"
  to = "https://cover-iq.com/:splat"
  status = 301
  force = true
